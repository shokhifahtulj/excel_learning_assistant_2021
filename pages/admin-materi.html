<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#00552e">
    <title>Kelola Materi - Excel Master</title>
    
    <link rel="manifest" href="../manifest.json">
    <link href="../css/style.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind-config.js"></script>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/admin.js" defer></script>
    <script src="../js/app.js" defer></script>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
    
    <app-header></app-header>
    <app-sidebar></app-sidebar>

    <main class="lg:ml-[280px] pt-20 pb-24 px-4 md:px-8 max-w-7xl mx-auto min-h-[100dvh] flex flex-col gap-6 transition-all-custom animate-fade-in">
        
        <!-- Header & Actions -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h2 class="text-2xl font-bold text-emerald-900 tracking-tight">Kelola Materi</h2>
                <p class="text-sm text-gray-500 mt-1">Tambahkan atau perbarui Course dan Lesson.</p>
            </div>
            <button id="btn-add-course" class="bg-primary hover:bg-emerald-800 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all-custom flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px]" data-icon="add">add</span>
                Buat Course Baru
            </button>
        </div>

        <!-- Course List Container -->
        <div id="course-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Rendered via JS -->
        </div>
    </main>

    <app-bottom-nav></app-bottom-nav>

    <!-- Modal Course -->
    <div id="modal-course" class="fixed inset-0 bg-black/60 z-[100] hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden transform transition-all duration-200 opacity-0 scale-95 flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <h3 id="modal-title" class="font-bold text-gray-900">Tambah Course Baru</h3>
                <button onclick="window.UI.closeModal('modal-course')" class="text-gray-400 hover:text-gray-700 transition-colors"><span class="material-symbols-outlined" data-icon="close">close</span></button>
            </div>
            <form id="course-form" class="flex flex-col overflow-y-auto">
                <input type="hidden" id="course-id">
                <div class="p-6 flex flex-col gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-700">Judul Course</label>
                        <input id="course-title" type="text" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none" required>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-700">Level (1-5)</label>
                        <select id="course-level" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none" required>
                            <option value="1">1 - Pemula</option>
                            <option value="2">2 - Dasar</option>
                            <option value="3">3 - Menengah</option>
                            <option value="4">4 - Lanjutan</option>
                            <option value="5">5 - Mahir</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-700">Deskripsi Singkat</label>
                        <textarea id="course-desc" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none" rows="2" required></textarea>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-700">Ikon (Material Symbols)</label>
                        <input id="course-icon" type="text" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none" value="functions" required>
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50 shrink-0">
                    <button type="button" onclick="window.UI.closeModal('modal-course')" class="px-4 py-2 bg-white border border-gray-200 text-gray-700 font-bold text-sm rounded-lg hover:bg-gray-50 transition-colors">Batal</button>
                    <button type="submit" id="btn-save-course" class="px-4 py-2 bg-primary hover:bg-emerald-800 text-white font-bold text-sm rounded-lg transition-colors shadow-sm flex items-center gap-2">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Lesson -->
    <div id="modal-lesson" class="fixed inset-0 bg-black/60 z-[100] hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden transform transition-all duration-200 opacity-0 scale-95 flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <h3 id="modal-lesson-title" class="font-bold text-gray-900">Tambah Lesson Baru</h3>
                <button onclick="window.UI.closeModal('modal-lesson')" class="text-gray-400 hover:text-gray-700 transition-colors"><span class="material-symbols-outlined" data-icon="close">close</span></button>
            </div>
            <form id="lesson-form" class="flex flex-col overflow-y-auto max-h-[80vh]">
                <input type="hidden" id="lesson-id">
                <input type="hidden" id="lesson-courseId">
                <div class="p-6 flex flex-col gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-700">Judul Lesson</label>
                        <input id="lesson-title" type="text" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none" required>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-gray-700">Konten Pembelajaran (HTML / Teks)</label>
                        <textarea id="lesson-content" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none font-mono" rows="8" placeholder="<h3>Judul Sub-Materi</h3><p>Penjelasan...</p>" required></textarea>
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50 shrink-0">
                    <button type="button" onclick="window.UI.closeModal('modal-lesson')" class="px-4 py-2 bg-white border border-gray-200 text-gray-700 font-bold text-sm rounded-lg hover:bg-gray-50 transition-colors">Batal</button>
                    <button type="submit" id="btn-save-lesson" class="px-4 py-2 bg-primary hover:bg-emerald-800 text-white font-bold text-sm rounded-lg transition-colors shadow-sm flex items-center gap-2">Simpan</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
