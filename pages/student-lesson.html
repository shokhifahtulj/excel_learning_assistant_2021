<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#00552e">
    <title>Membaca Materi - Excel Master</title>
    
    <link rel="manifest" href="../manifest.json">
    <link href="../css/style.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind-config.js"></script>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/chatbot-data.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/student.js" defer></script>
    <script src="../js/app.js" defer></script>
    
    <style>
        /* Prose styling for lesson content */
        .prose h3 { font-size: 1.25rem; font-weight: bold; color: #064e3b; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .prose p { margin-bottom: 1rem; color: #4b5563; line-height: 1.6; }
        .prose code { background-color: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; color: #0f172a; border: 1px solid #e2e8f0;}
    </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
    
    <app-header></app-header>
    <app-sidebar></app-sidebar>

    <main class="lg:ml-[280px] pt-20 pb-24 px-4 md:px-8 max-w-4xl mx-auto min-h-[100dvh] flex flex-col gap-6 transition-all-custom animate-fade-in">
        
        <div class="mb-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <a href="student-courses.html" class="inline-flex items-center gap-1 text-sm font-semibold text-emerald-600 hover:text-emerald-800 transition-colors mb-4">
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                    Kembali ke Daftar Materi
                </a>
                <p id="lesson-course-title" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">...</p>
                <h2 id="lesson-title" class="text-3xl font-bold text-gray-900 tracking-tight">...</h2>
            </div>
            <button onclick="window.openChatbot()" class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold text-xs rounded-lg transition-colors border border-emerald-200 shadow-sm whitespace-nowrap">
                <span class="material-symbols-outlined text-[16px]" data-icon="smart_toy">smart_toy</span>
                Tanya Chatbot
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-6 md:p-10">
            <div id="lesson-content-body" class="prose max-w-none">
                <!-- Injected via JS -->
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-4">
            <a id="btn-prev" href="#" class="hidden px-5 py-2.5 bg-white border border-gray-200 text-gray-700 font-bold text-sm rounded-xl hover:bg-gray-50 transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span> Sebelumnya
            </a>
            <div class="flex-grow hidden sm:block"></div>
            <button id="btn-complete" class="w-full sm:w-auto px-6 py-3 bg-primary hover:bg-emerald-800 text-white font-bold text-sm rounded-xl transition-colors shadow-md flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span> Tandai Selesai
            </button>
            <a id="btn-next" href="#" class="hidden w-full sm:w-auto px-6 py-3 bg-emerald-50 text-emerald-700 font-bold text-sm rounded-xl hover:bg-emerald-100 transition-colors flex items-center justify-center gap-2">
                Lanjut <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
            </a>
        </div>

    </main>

    <app-chatbot></app-chatbot>
    <app-bottom-nav></app-bottom-nav>
</body>
</html>
