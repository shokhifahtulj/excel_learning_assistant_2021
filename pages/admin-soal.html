<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#00552e">
    <title>Kelola Soal - Excel Master</title>
    
    <link rel="manifest" href="../manifest.json">
    <link href="../css/style.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind-config.js"></script>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/admin.js" defer></script>
    <script src="../js/app.js" defer></script>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
    
    <app-header></app-header>
    <app-sidebar></app-sidebar>

    <main class="lg:ml-[280px] pt-20 pb-24 px-4 md:px-8 max-w-7xl mx-auto min-h-[100dvh] flex flex-col gap-6 transition-all-custom animate-fade-in">
        
        <!-- Header & Actions -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h2 class="text-2xl font-bold text-emerald-900 tracking-tight">Bank Soal</h2>
                <p class="text-sm text-gray-500 mt-1">Buat kuis untuk mengevaluasi pemahaman siswa di tiap Course.</p>
            </div>
        </div>

        <!-- List Soal -->
        <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 overflow-hidden flex flex-col">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-emerald-900">Daftar Kuis per Course</h3>
            </div>
            <div id="quiz-list-container" class="divide-y divide-gray-100">
                <!-- Rendered via JS -->
            </div>
        </div>
    </main>

    <app-bottom-nav></app-bottom-nav>

    <!-- Modal Quiz -->
    <div id="modal-quiz" class="fixed inset-0 bg-black/60 z-[100] hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden transform transition-all duration-200 opacity-0 scale-95 flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <h3 id="modal-quiz-title" class="font-bold text-gray-900">Kelola Quiz</h3>
                <button onclick="window.UI.closeModal('modal-quiz')" class="text-gray-400 hover:text-gray-700 transition-colors"><span class="material-symbols-outlined" data-icon="close">close</span></button>
            </div>
            <form id="quiz-form" class="flex flex-col overflow-y-auto bg-white flex-grow p-6">
                <input type="hidden" id="quiz-courseId">
                <div id="questions-container" class="flex flex-col gap-4">
                    <!-- Dynamic Questions injected here -->
                </div>
                <button type="button" onclick="window.addEmptyQuestion()" class="mt-4 w-full py-3 border-2 border-dashed border-emerald-200 hover:border-emerald-500 text-emerald-600 hover:bg-emerald-50 rounded-xl transition-colors font-bold text-sm flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]" data-icon="add_circle">add_circle</span> Tambah Pertanyaan
                </button>
            </form>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50 shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.02)] relative z-10">
                <button type="button" onclick="window.UI.closeModal('modal-quiz')" class="px-5 py-2.5 bg-white border border-gray-200 text-gray-700 font-bold text-sm rounded-xl hover:bg-gray-50 transition-colors">Batal</button>
                <button type="submit" form="quiz-form" id="btn-save-quiz" class="px-5 py-2.5 bg-primary hover:bg-emerald-800 text-white font-bold text-sm rounded-xl transition-colors shadow-md flex items-center gap-2">Simpan Quiz</button>
            </div>
        </div>
    </div>
</body>
</html>
